<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vite App</title>
  </head>
  <body>
    <header class="bg-dark text-white py-5">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-lg-8">
            <h1 class="display-4">RSS агрегатор</h1>

            <p class="lead">
              Начните читать RSS сегодня! Это легко, это красиво.
            </p>

            <form class="mt-3" id="rss-form">
              <div class="row g-2">
                <div class="col-md-9">
                  <div class="form-floating">
                    <input
                      id="rss-form-input"
                      name="url"
                      type="text"
                      class="form-control form-control-lg"
                      placeholder="Ссылка RSS"
                    />
                    <label for="rss-form-input">Ссылка RSS</label>
                  </div>
                </div>

                <div class="col-md-3 d-grid">
                  <button
                    type="submit"
                    class="btn btn-primary btn-lg"
                  >
                    Добавить
                  </button>
                </div>
              </div>

              <div class="row">
                <div class="col-md-9">
                  <div class="form-text text-white-50">
                    Пример: https://lorem-rss.hexlet.app/feed
                  </div>
                  <p class="m-0 small" id="rss-form-helper"></p>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
    </header>

    <main class="flex-grow-1 py-5" id="rss-main">
      <div class="container">
        <div class="row g-4" id="rss-content-container"></div>
      </div>
    </main>

    <div
      class="modal fade"
      id="rss-modal"
      tabindex="-1"
      aria-labelledby="modalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h3 class="modal-title fs-5"></h3>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Закрыть"
              id="rss-modal-close-button"
            ></button>
          </div>
          <div class="modal-body" id="rss-modal-body"></div>
          <div class="modal-footer">
            <a
              class="btn btn-primary"
              href="#"
              target="_blank"
              rel="noopener noreferrer"
              >Читать полностью</a
            >
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
              id="rss-modal-cancel-button"
            >
              Закрыть
            </button>
          </div>
        </div>
      </div>
    </div>

    <template id="rss-posts-list-template">
      <div class="col-12 col-lg-6">
        <div class="card border-0">
          <div class="card-body">
            <h2 class="h3 mb-0">Посты</h2>
            <ul
              class="list-group list-group-flush mt-4"
              id="rss-posts-list"
            ></ul>
          </div>
        </div>
      </div>
    </template>

    <template id="rss-posts-item-template">
      <li
        class="list-group-item d-flex justify-content-between align-items-start border-0 border-end-0"
      >
        <a
          href="#"
          class="fw-bold"
          target="_blank"
          rel="noopener noreferrer"
          >Пост</a
        >
        <button
          type="button"
          class="btn btn-outline-primary btn-sm"
          data-id="${post.id}"
          data-bs-toggle="modal"
          data-bs-target="#rss-modal"
        >
          Просмотр
        </button>
      </li>
    </template>

    <template id="rss-feeds-list-template">
      <div class="col-12 col-lg-6">
        <div class="card border-0">
          <div class="card-body">
            <h2 class="h3 mb-0">Фиды</h2>
            <ul
              class="list-group list-group-flush mt-4"
              id="rss-feeds-list"
            ></ul>
          </div>
        </div>
      </div>
    </template>

    <template id="rss-feeds-item-template">
      <li class="list-group-item border-0 border-end-0">
        <h3 class="h6 m-0">Фид</h3>
        <p class="m-0 small text-black-50">Описание фида</p>
      </li>
    </template>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
